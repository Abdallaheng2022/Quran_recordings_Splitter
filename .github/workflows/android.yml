name: Android CI
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: pub get
        working-directory: app
        run: flutter pub get
      - name: Build APK
        working-directory: app
        # ⬇⬇⬇ بدّل السطر ده بعنوان الـ Space بتاعك على Hugging Face ⬇⬇⬇
        run: flutter build apk --release --dart-define=API_BASE=https://REPLACE-WITH-YOUR-SPACE.hf.space
      - uses: actions/upload-artifact@v4
        with:
          name: quran-splitter-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
